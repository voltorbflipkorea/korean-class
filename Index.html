<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한국어 퀴즈 7월 1주차</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #F6F8FA;
    font-family: 'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    color: #2B3A55;
    padding-bottom: 40px;
  }
  /* ── 배너 ── */
  .banner {
    position: relative; background: #2B3A55; color: #fff;
    padding: 34px 20px 30px; overflow: hidden;
  }
  .banner-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.06) 1px, transparent 1px);
    background-size: 26px 26px;
  }
  .banner-inner { position: relative; max-width: 640px; margin: 0 auto; }
  .eyebrow {
    display: inline-block; font-size: 12px; letter-spacing: .12em;
    background: rgba(255,255,255,.14); padding: 4px 10px;
    border-radius: 999px; margin-bottom: 10px;
  }
  .banner h1 { font-size: 30px; font-weight: 800; line-height: 1.25; }
  .week-tag {
    display: inline-block; background: #FFD24C; color: #2B3A55;
    border-radius: 10px; padding: 2px 12px; margin-left: 8px;
    font-size: 22px; transform: rotate(-2deg);
  }
  .banner-sub { margin-top: 10px; font-size: 13px; color: rgba(255,255,255,.75); }
  .stamp {
    position: absolute; right: 18px; top: 22px; width: 58px; height: 58px;
    border: 2px solid rgba(255,255,255,.35); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; line-height: 1.15; text-align: center;
    color: rgba(255,255,255,.55); transform: rotate(12deg);
  }
  /* ── 컨트롤 ── */
  .controls {
    max-width: 640px; margin: 18px auto 0; padding: 0 16px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    border: 1.5px solid #D5DCE6; background: #fff; color: #2B3A55;
    border-radius: 999px; padding: 6px 13px; font-size: 13px;
    font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .chip.on { color: #fff; }
  .shuffle-btn {
    align-self: flex-end; border: none; background: #FFD24C; color: #2B3A55;
    border-radius: 12px; padding: 9px 16px; font-size: 14px; font-weight: 700;
    cursor: pointer; box-shadow: 0 2px 0 #E5B93A; font-family: inherit;
  }
  .shuffle-btn:active { transform: translateY(1px); box-shadow: 0 1px 0 #E5B93A; }
  /* ── 진행 바 ── */
  .progress-wrap {
    max-width: 640px; margin: 14px auto 0; padding: 0 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .progress-track { flex: 1; height: 8px; background: #E4E9F0; border-radius: 999px; overflow: hidden; }
  .progress-bar { height: 100%; background: #2B3A55; border-radius: 999px; transition: width .3s; width: 0; }
  .progress-text { font-size: 12px; color: #7A8699; font-weight: 600; white-space: nowrap; }
  /* ── 카드 ── */
  .card {
    max-width: 640px; margin: 10px auto 0; padding: 22px 20px 18px;
    background: #fff; border-radius: 20px;
    box-shadow: 0 4px 18px rgba(43,58,85,.08);
  }
  @media (max-width: 672px) { .card { margin-left: 16px; margin-right: 16px; } }
  .tag-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
  .set-tag { color: #fff; font-size: 12px; font-weight: 700; border-radius: 8px; padding: 4px 10px; }
  .rule-text { font-size: 12px; color: #8A94A6; }
  .sentence { font-size: 18px; line-height: 1.75; margin-bottom: 18px; word-break: keep-all; }
  .blank {
    display: inline-block; min-width: 64px; text-align: center;
    border-bottom: 2.5px solid #2B3A55; font-weight: 800; padding: 0 6px;
  }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    display: flex; align-items: center; gap: 12px; width: 100%; text-align: left;
    border: 2px solid #E2E8F0; background: #FBFCFE; border-radius: 14px;
    padding: 13px 14px; font-size: 16px; cursor: pointer;
    transition: transform .08s, border-color .15s, background .15s;
    font-family: inherit; color: #2B3A55;
  }
  .opt:not(:disabled):hover { border-color: #2B3A55; transform: translateY(-1px); }
  .opt:focus-visible { outline: 3px solid #FFD24C; outline-offset: 2px; }
  .opt-mark {
    flex: none; width: 30px; height: 30px; border-radius: 9px;
    background: #EDF1F7; color: #2B3A55; font-weight: 800;
    display: flex; align-items: center; justify-content: center; font-size: 15px;
  }
  .opt-text { font-weight: 600; }
  .opt.correct { border-color: #2E8B57; background: #EDFAF2; }
  .opt.correct .opt-mark { background: #2E8B57; color: #fff; }
  .opt.wrong { border-color: #C0392B; background: #FDF0EE; }
  .opt.wrong .opt-mark { background: #C0392B; color: #fff; }
  .opt.dim { opacity: .45; }
  .opt:disabled { cursor: default; }
  .opt-badge {
    margin-left: auto; font-size: 12px; font-weight: 800;
    color: #2E8B57; background: #DDF3E6; border-radius: 999px; padding: 3px 10px;
  }
  .opt-badge.bad { color: #C0392B; background: #FADBD6; }
  .explain {
    margin-top: 14px; background: #F3F6FB; border-radius: 12px;
    padding: 12px 14px; font-size: 14px; line-height: 1.6; color: #44506A;
    animation: pop .18s ease-out;
  }
  @keyframes pop { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  .card-footer { margin-top: 18px; display: flex; justify-content: space-between; align-items: center; }
  .score-text { font-size: 13px; color: #7A8699; font-weight: 600; }
  .next-btn {
    border: none; background: #2B3A55; color: #fff; border-radius: 12px;
    padding: 10px 18px; font-size: 14px; font-weight: 700;
    cursor: pointer; font-family: inherit;
  }
  .next-btn:disabled { opacity: .4; cursor: default; }
  /* 결과 화면 */
  .result { text-align: center; padding: 8px 0 4px; }
  .result .emoji { font-size: 44px; }
  .result h2 { margin: 10px 0 4px; font-size: 24px; }
  .result p { color: #7A8699; }
  .result .next-btn { margin-top: 20px; }
  footer { text-align: center; font-size: 12px; color: #A5AEBD; margin-top: 22px; padding: 0 16px; }
  @media (prefers-reduced-motion: reduce) { .opt, .explain, .progress-bar { transition: none; animation: none; } }
  @media (max-width: 480px) { .banner h1 { font-size: 24px; } .week-tag { font-size: 18px; } }
</style>
</head>
<body>

<header class="banner">
  <div class="banner-grid" aria-hidden="true"></div>
  <div class="banner-inner">
    <span class="eyebrow">고려대 한국어 · 문법 복습</span>
    <h1>한국어 퀴즈 <span class="week-tag" id="weekLabel"></span></h1>
    <p class="banner-sub">-던데 · -는다면 · -을 테니까 · -을 텐데 · -는다고요? · -(으)면</p>
  </div>
  <div class="stamp" aria-hidden="true">받침<br>○</div>
</header>

<div class="controls">
  <div class="chips" id="chips"></div>
  <button class="shuffle-btn" id="shuffleBtn" title="문제와 보기를 다시 섞기">🔀 다시 섞기</button>
</div>

<div class="progress-wrap">
  <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
  <span class="progress-text" id="progressText"></span>
</div>

<main id="stage"></main>

<footer>보기(ㄱ/ㄴ)와 문제 순서는 접속·섞기마다 랜덤이에요 · 다음 주차 추가 예정</footer>

/* ── 상태 ── */
const week = WEEKS[0];
const MARKS = ["ㄱ", "ㄴ"];
let setFilter = "all";
let deck = [];
let cursor = 0, picked = null, ok = 0, no = 0, finished = false;

/* ── 유틸 ── */
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildDeck() {
  const pool = [];
  week.sets.forEach(set => {
    if (setFilter !== "all" && set.id !== setFilter) return;
    set.items.forEach(it => {
      const correctFirst = Math.random() < 0.5;
      pool.push({
        setName: set.name, color: set.color, rule: set.rule,
        s: it.s, why: it.why,
        options: correctFirst ? [it.correct, it.wrong] : [it.wrong, it.correct],
        answerIdx: correctFirst ? 0 : 1
      });
    });
  });
  return shuffle(pool);
}

function reshuffle(filter) {
  if (filter !== undefined) setFilter = filter;
  deck = buildDeck();
  cursor = 0; picked = null; ok = 0; no = 0; finished = false;
  renderChips();
  render();
}

/* ── 렌더 ── */
function renderChips() {
  const total = week.sets.reduce((n, s) => n + s.items.length, 0);
  const el = document.getElementById("chips");
  el.innerHTML = "";
  const all = document.createElement("button");
  all.className = "chip" + (setFilter === "all" ? " on" : "");
  all.textContent = "전체 " + total;
  if (setFilter === "all") { all.style.background = "#2B3A55"; all.style.borderColor = "#2B3A55"; }
  all.onclick = () => reshuffle("all");
  el.appendChild(all);
  week.sets.forEach(s => {
    const b = document.createElement("button");
    b.className = "chip" + (setFilter === s.id ? " on" : "");
    b.textContent = s.name;
    if (setFilter === s.id) { b.style.background = s.color; b.style.borderColor = s.color; }
    b.onclick = () => reshuffle(s.id);
    el.appendChild(b);
  });
}

function render() {
  const doneCount = ok + no;
  const pct = deck.length ? Math.round(doneCount / deck.length * 100) : 0;
  document.getElementById("progressBar").style.width = pct + "%";
  document.getElementById("progressText").textContent =
    (finished ? deck.length : Math.min(cursor + 1, deck.length)) + " / " + deck.length;

  const stage = document.getElementById("stage");
  stage.innerHTML = "";
  const card = document.createElement("section");
  card.className = "card";

  if (finished) {
    const emoji = ok === deck.length ? "🏆" : ok >= deck.length * 0.7 ? "🎉" : "📚";
    const msg = ok === deck.length ? "완벽해요! 전부 맞혔어요."
      : ok >= deck.length * 0.7 ? "잘하고 있어요. 틀린 유형만 다시 돌려 보세요."
      : "괜찮아요. 다시 섞어서 한 번 더!";
    card.innerHTML =
      '<div class="result"><div class="emoji">' + emoji + '</div>' +
      '<h2>' + ok + ' / ' + deck.length + ' 정답</h2><p>' + msg + '</p></div>';
    const btn = document.createElement("button");
    btn.className = "next-btn"; btn.textContent = "🔀 다시 풀기";
    btn.onclick = () => reshuffle();
    card.querySelector(".result").appendChild(btn);
    stage.appendChild(card);
    return;
  }

  const q = deck[cursor];
  if (!q) return;

  // 태그
  const tagRow = document.createElement("div");
  tagRow.className = "tag-row";
  tagRow.innerHTML =
    '<span class="set-tag" style="background:' + q.color + '">' + q.setName + '</span>' +
    '<span class="rule-text">' + q.rule + '</span>';
  card.appendChild(tagRow);

  // 문장
  const p = document.createElement("p");
  p.className = "sentence";
  const blankText = picked !== null ? q.options[q.answerIdx] : "____";
  p.append(document.createTextNode(q.s[0]));
  const blank = document.createElement("span");
  blank.className = "blank"; blank.textContent = blankText;
  p.appendChild(blank);
  p.append(document.createTextNode(q.s[1]));
  card.appendChild(p);

  // 보기
  const opts = document.createElement("div");
  opts.className = "options";
  q.options.forEach((opt, i) => {
    const b = document.createElement("button");
    b.className = "opt";
    if (picked !== null) {
      b.disabled = true;
      if (i === q.answerIdx) b.classList.add("correct");
      else if (i === picked) b.classList.add("wrong");
      else b.classList.add("dim");
    }
    b.innerHTML = '<span class="opt-mark">' + MARKS[i] + '</span><span class="opt-text">' + opt + '</span>';
    if (picked !== null && i === q.answerIdx) b.innerHTML += '<span class="opt-badge">정답</span>';
    if (picked !== null && i === picked && i !== q.answerIdx) b.innerHTML += '<span class="opt-badge bad">오답</span>';
    b.onclick = () => {
      if (picked !== null) return;
      picked = i;
      if (i === q.answerIdx) ok++; else no++;
      render();
    };
    opts.appendChild(b);
  });
  card.appendChild(opts);

  // 해설
  if (picked !== null) {
    const ex = document.createElement("div");
    ex.className = "explain";
    const good = picked === q.answerIdx;
    ex.innerHTML = '<strong style="color:' + (good ? '#2E8B57' : '#C0392B') + '">' +
      (good ? '정답이에요! ' : '아쉬워요. ') + '</strong>' + q.why;
    card.appendChild(ex);
  }

  // 하단
  const foot = document.createElement("div");
  foot.className = "card-footer";
  foot.innerHTML = '<span class="score-text">✅ ' + ok + ' · ❌ ' + no + '</span>';
  const nextBtn = document.createElement("button");
  nextBtn.className = "next-btn";
  nextBtn.disabled = picked === null;
  nextBtn.textContent = (cursor + 1 >= deck.length) ? "결과 보기 →" : "다음 문제 →";
  nextBtn.onclick = () => {
    if (cursor + 1 >= deck.length) { finished = true; }
    else { cursor++; picked = null; }
    render();
  };
  foot.appendChild(nextBtn);
  card.appendChild(foot);

  stage.appendChild(card);
}

/* ── 시작 ── */
document.getElementById("weekLabel").textContent = week.label;
document.getElementById("shuffleBtn").onclick = () => reshuffle();
reshuffle("all");
</script>
