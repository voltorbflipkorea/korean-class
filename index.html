var week = WEEKS[0];
var MARKS = ["ㄱ","ㄴ"];
var setFilter = "all";
var deck = [];

function shuffle(arr){ var a=arr.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }

function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function buildDeck(){
  var pool=[];
  for(var si=0; si<week.sets.length; si++){
    var set=week.sets[si];
    if(setFilter!=="all" && set.id!==setFilter) continue;
    for(var ii=0; ii<set.items.length; ii++){
      var it=set.items[ii];
      var correctFirst=Math.random()<0.5;
      pool.push({
        setName:set.name, color:set.color, rule:set.rule,
        a:it.a, b:it.b, why:it.why,
        options: correctFirst ? [it.correct,it.wrong] : [it.wrong,it.correct],
        answerIdx: correctFirst ? 0 : 1
      });
    }
  }
  return shuffle(pool);
}

function renderChips(){
  var total=0; for(var i=0;i<week.sets.length;i++){ total+=week.sets[i].items.length; }
  var html='<button class="chip'+(setFilter==="all"?" on":"")+'" data-f="all">전체 '+total+'</button>';
  for(var j=0;j<week.sets.length;j++){
    var s=week.sets[j];
    var on=setFilter===s.id;
    html+='<button class="chip'+(on?" on":"")+'" data-f="'+s.id+'" style="'+(on?"background:"+s.color+";border-color:"+s.color+";color:#fff;":"")+'">'+esc(s.name)+'</button>';
  }
  document.getElementById("chips").innerHTML=html;
  var btns=document.getElementById("chips").getElementsByTagName("button");
  for(var k=0;k<btns.length;k++){
    btns[k].onclick=function(){ setFilter=this.getAttribute("data-f"); render(); };
  }
}

function render(){
  deck=buildDeck();
  renderChips();
  document.getElementById("count").textContent="총 "+deck.length+"문제 · 하나씩 골라 보세요";
  var html="";
  for(var i=0;i<deck.length;i++){
    var q=deck[i];
    html+='<section class="card" data-ans="'+q.answerIdx+'">';
    html+='<div class="tag-row"><span class="set-tag" style="background:'+q.color+'">'+esc(q.setName)+'</span><span class="rule">'+esc(q.rule)+'</span><span class="qnum">'+(i+1)+'/'+deck.length+'</span></div>';
    html+='<p class="sentence">'+esc(q.a)+'<span class="blank">____</span>'+esc(q.b)+'</p>';
    html+='<div class="opts">';
    for(var o=0;o<q.options.length;o++){
      html+='<button class="opt" data-i="'+o+'"><span class="opt-mark">'+MARKS[o]+'</span><span class="opt-text">'+esc(q.options[o])+'</span><span class="opt-badge">'+(o===q.answerIdx?"정답":"오답")+'</span></button>';
    }
    html+='</div>';
    html+='<div class="explain"><b></b>'+esc(q.why)+'</div>';
    html+='</section>';
  }
  document.getElementById("stage").innerHTML=html;

  var cards=document.getElementById("stage").getElementsByClassName("card");
  for(var c=0;c<cards.length;c++){
    (function(card){
      var ans=parseInt(card.getAttribute("data-ans"),10);
      var opts=card.getElementsByClassName("opt");
      var blank=card.getElementsByClassName("blank")[0];
      var correctText=card.getElementsByClassName("opt-text")[ans].textContent;
      var explain=card.getElementsByClassName("explain")[0];
      var answered=false;
      for(var o=0;o<opts.length;o++){
        (function(btn,idx){
          btn.onclick=function(){
            if(answered) return; answered=true;
            for(var m=0;m<opts.length;m++){
              if(m===ans) opts[m].className="opt correct";
              else if(m===idx) opts[m].className="opt wrong";
              else opts[m].className="opt dim";
            }
            blank.textContent=correctText; blank.className="blank filled";
            var good=idx===ans;
            explain.className="explain show"+(good?"":" bad");
            explain.getElementsByTagName("b")[0].textContent=good?"정답이에요! ":"아쉬워요. ";
          };
        })(opts[o],o);
      }
    })(cards[c]);
  }
}

document.getElementById("shuffleBtn").onclick=function(){ render(); window.scrollTo(0,0); };
document.getElementById("resetBtn").onclick=function(){ render(); };
render();
</script>
